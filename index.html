<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Tip Calculator</h1>

<form id="tipForm">

    <p>Currency conversion:</p>
    <p>$1 USD = €0.95 EUR for Euros</p>
    <p>$1 USD = ₹85 INR for Rupees</p>

    <label for="bill">Bill Total: $</label>
    <input type="text" id="bill" placeholder="Enter amount">

    <label>Total Bill with Tax (11%):</label>
    <input type="text" id="totalTax" disabled>

    <label for="currency">Select Currency:</label>
    <select id="currency">
        <option value="inr">Indian Rupee</option>
        <option value="eur">Euro</option>
    </select>

    <label for="tipRange">Tip</label>
    <div class="slider-container">
        <input type="range" id="tipRange" min="0" max="100" value="0">
        <span id="tipDisplay">0%</span>
    </div>

    <label>Converted Tip Amount:</label>
    <input type="text" id="tipAmount" disabled>

    <label>Converted Total Bill with Tip and Tax:</label>
    <input type="text" id="totalTip" disabled>

</form>

<script src="script.js"></script>
</body>
</html>
